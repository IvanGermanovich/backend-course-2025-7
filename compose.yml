services:
  web:
    build: .
    image: inventory-app:latest
    container_name: inventory_web_container
    ports:
      - "${PORT}:${PORT}"
      - "9229:9229"
    environment:
      - PORT=${PORT}
      - DB_USER=${DB_USER}
      - DB_HOST=${DB_HOST}
      - DB_NAME=${DB_NAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_PORT=${DB_PORT}
    volumes:
      - .:/app
      - /app/node_modules
      - cache:/app/cache
    command: npm run debug -- --host 0.0.0.0 --port ${PORT} --cache /app/cache
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    container_name: inventory_db_container
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  cache: